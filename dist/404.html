<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wasp Atlas</title>
    <script>
      var locationRef = window.location;
      var isGithubPagesProject = /\.github\.io$/i.test(locationRef.hostname);
      var pathSegmentsToKeep = isGithubPagesProject ? 1 : 0;
      var newUrl =
        locationRef.protocol +
        '//' +
        locationRef.hostname +
        (locationRef.port ? ':' + locationRef.port : '') +
        locationRef.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        locationRef.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (locationRef.search ? '&' + locationRef.search.slice(1).replace(/&/g, '~and~') : '') +
        locationRef.hash;

      locationRef.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
