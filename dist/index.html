<body class="page">

  <script>
    // GitHub Pages SPA fallback: decode /?/<route> redirects from 404.html.
    (function (location) {
      if (location.search[1] === '/') {
        var basePath = '/Wasp-Atas-Explorer/';
        if (basePath[basePath.length - 1] !== '/') {
          basePath += '/';
        }

        var basePrefix = basePath === '/' ? '' : basePath.slice(0, -1);
        var decoded = location.search
          .slice(1)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(null, '', basePrefix + decoded + location.hash);
      }
    })(window.location);
  </script>
